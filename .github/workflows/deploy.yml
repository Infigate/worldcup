# GitHub Pagesへのデプロイ + 試合結果の定期自動更新
#
# - mainへのpush時: ビルドしてデプロイ
# - 定期実行(JST 0/6/12/18時): npm run update-results で結果を取得し、
#   変更があればcommitしてから再ビルド・再デプロイ
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3,9,15,21 * * *' # UTC 3/9/15/21時 = JST 12/18/0/6時
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 試合結果を更新 (定期実行・手動実行時のみ)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run update-results
          if ! git diff --quiet src/data/results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/results.json
            git commit -m "試合結果を自動更新"
            git push
          else
            echo "結果データに変更なし"
          fi

      - run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
