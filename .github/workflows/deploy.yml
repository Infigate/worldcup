# GitHub Pagesへのデプロイ + 試合結果の定期自動更新
#
# - mainへのpush時: ビルドしてデプロイ
# - 定期実行(JST 0/6/12/18時): npm run update-results で結果を取得し、
#   変更があればcommitしてから再ビルド・再デプロイ
#
# Pagesの配信ソース設定(branch / GitHub Actions)のどちらでも動くよう、
# gh-pagesブランチへのpushとPagesアーティファクトのデプロイを両方行う。
# 設定と一致しない側のステップは失敗するが continue-on-error で無視される。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3,9,15,21 * * *' # UTC 3/9/15/21時 = JST 12/18/0/6時
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 試合結果を更新 (定期実行・手動実行時のみ)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run update-results
          if ! git diff --quiet src/data/results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/results.json
            git commit -m "試合結果を自動更新"
            git push
          else
            echo "結果データに変更なし"
          fi

      - run: npm run build

      # 配信ソース「Deploy from a branch (gh-pages)」用
      - name: gh-pagesブランチへデプロイ
        uses: peaceiris/actions-gh-pages@v4
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      # 配信ソース「GitHub Actions」用
      - uses: actions/configure-pages@v5
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        continue-on-error: true
