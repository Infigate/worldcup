# GitHub Pagesへのデプロイ + 試合結果の定期自動更新
#
# - mainへのpush時: ビルドしてデプロイ
# - 定期実行(毎時0分): npm run update-results で結果を取得し、
#   変更があればcommitしてから再ビルド・再デプロイ。
#   変更が無ければビルド・デプロイはスキップ。
#
# 配信はGitHub Actions方式(Pagesアーティファクト)に一本化。
# 「Pagesのソース設定を揃える」ステップが build_type=workflow を冪等に設定するため、
# Settings → Pages を手動で変更する必要はない。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *' # 毎時0分 (フィード更新の遅延を拾うため高頻度でポーリング)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 試合結果を更新 (定期実行・手動実行時のみ)
        id: update
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run update-results
          if ! git diff --quiet src/data/results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/results.json
            git commit -m "試合結果を自動更新"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "結果データに変更なし"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # 定期実行で結果に変更が無ければ、以降のビルド・デプロイをスキップ
      - name: Pagesのソース設定を揃える (build_type=workflow, 冪等)
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow

      - run: npm run build
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'

      - uses: actions/configure-pages@v5
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
