# GitHub Pagesへのデプロイ + 試合結果の定期自動更新
#
# - mainへのpush時: ビルドしてデプロイ
# - 定期実行(毎時0分): npm run update-results で結果を取得し、
#   変更があればcommitしてから再ビルド・再デプロイ。
#   変更が無ければビルド・デプロイはスキップ。
#
# デプロイは実行時にPagesのソース設定(build_type)を読み取り、設定に合う方式を使う:
#   - legacy   (Deploy from a branch): gh-pagesブランチへpush
#   - workflow (GitHub Actions):       Pagesアーティファクトをデプロイ
# 推奨はworkflow方式。切替はSettings → Pages → Source を「GitHub Actions」に
# 変更するだけでよい(次回実行から自動で切り替わる)。GITHUB_TOKENでは
# build_typeを変更できない(admin権限が必要)ため、ここでは変更を試みない。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *' # 毎時0分 (フィード更新の遅延を拾うため高頻度でポーリング)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 試合結果を更新 (定期実行・手動実行時のみ)
        id: update
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          npm run update-results
          if ! git diff --quiet src/data/results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/results.json
            git commit -m "試合結果を自動更新"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "結果データに変更なし"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # 定期実行で結果に変更が無ければ、以降のビルド・デプロイをスキップ
      - name: Pagesのソース設定を読み取り
        id: pages
        if: github.event_name != 'schedule' || steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bt=$(gh api "repos/${{ github.repository }}/pages" --jq .build_type)
          echo "現在のbuild_type: $bt"
          echo "build_type=$bt" >> "$GITHUB_OUTPUT"

      - run: npm run build
        if: steps.pages.outputs.build_type != ''

      # 配信ソース「Deploy from a branch (gh-pages)」用
      - name: gh-pagesブランチへデプロイ
        if: steps.pages.outputs.build_type == 'legacy'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      # 配信ソース「GitHub Actions」用
      - uses: actions/configure-pages@v5
        if: steps.pages.outputs.build_type == 'workflow'

      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outputs.build_type == 'workflow'
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
        if: steps.pages.outputs.build_type == 'workflow'
